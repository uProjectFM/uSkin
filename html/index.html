<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uSkin</title>
    <!-- uGen Design System Fonts -->
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Font pre-render: forces glyph cache population before first HUD show -->
    <div aria-hidden="true" style="position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;pointer-events:none;opacity:0"><span style="font-family:'Teko',sans-serif;font-weight:400">x</span><span style="font-family:'Teko',sans-serif;font-weight:500">x</span><span style="font-family:'Teko',sans-serif;font-weight:600">x</span><span style="font-family:'Teko',sans-serif;font-weight:700">x</span><span style="font-family:'Archivo',sans-serif;font-weight:400">x</span><span style="font-family:'Archivo',sans-serif;font-weight:400;font-style:italic">x</span><span style="font-family:'Archivo',sans-serif;font-weight:500">x</span><span style="font-family:'Archivo',sans-serif;font-weight:600">x</span><span style="font-family:'Archivo',sans-serif;font-weight:700">x</span><span style="font-family:'Oxanium',sans-serif;font-weight:400">x</span><span style="font-family:'Oxanium',sans-serif;font-weight:500">x</span><span style="font-family:'Oxanium',sans-serif;font-weight:600">x</span><span style="font-family:'Oxanium',sans-serif;font-weight:700">x</span></div>
    <!-- Main Container - hidden by default -->
    <div id="uSkin-container" class="hidden">
        <!-- Left Sidebar Panel (scrollable sections) -->
        <div id="uSkin-panel">
            <div id="uSkin-sections">
                <!-- Sections are dynamically rendered by script.js -->
            </div>
        </div>

        <!-- Options Toolbar (camera, clothes, rotate, save, exit) -->
        <div id="uSkin-options">
            <!-- Populated by script.js -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
